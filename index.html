<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechStore</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="checkbox" id="theme-switch" class="hidden-checkbox" />

    <header>
      <h1>TechStore</h1>
      <label for="theme-switch" class="theme-label">Toggle Dark Mode</label>
    </header>
    <main class="product-showcase">
      <div class="product-grid">
        <article class="product-card">
          <img src="assets\gaminglaptop.jpg" alt="Product" />
          <h3>Gaming Laptop</h3>
          <p class="price">$1,200</p>
          <div class="rating">★★★★★</div>
          <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
          <img src="assets/wireless mouse.jpg" alt="Product" />
          <h3>Wireless Mouse</h3>
          <p class="price">$50</p>
          <div class="rating">★★★★☆</div>
          <button class="add-btn">Add to Cart</button>
        </article>
      </div>
    </main>
  </body>
</html>
